name: Generate and Deploy Website

on:
  push:
    branches:
      - main
  schedule:
    # Запуск каждые 30 минут (например, в 00:00, 00:30, 01:00 и т.д.)
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Проверка репозитория
      uses: actions/checkout@v4

    - name: Настройка Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    - name: Установка зависимостей
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Запуск Python скрипта
      run: python utility_prices_tallinn.py  # Замените main.py на имя вашего скрипта

    - name: Деплой в Cloudflare Pages
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        projectName: 'my-awesome-site' # Придумайте имя для проекта в Cloudflare
        directory: 'public' # Папка, куда ваш скрипт сохраняет HTML
